# Cloud Build: build the production image remotely (no local docker) and push it
# to Artifact Registry. Vite INLINES VITE_* at build time, so the Supabase URL +
# anon key are passed as --build-arg here (the anon key is a public client
# credential, safe to inline in the browser bundle). Values are supplied at submit
# time via --substitutions and are NOT committed to the repo.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'VITE_CLINICAL_INTELLIGENCE_V1_ENABLED=${_VITE_CLINICAL_INTELLIGENCE_V1_ENABLED}'
      - '-t'
      - '${_IMAGE}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - '${_IMAGE}'

images:
  - '${_IMAGE}'

substitutions:
  _VITE_SUPABASE_URL: ''
  _VITE_SUPABASE_ANON_KEY: ''
  # Clinical Intelligence V1 client gate (build-time inline). Defaults to 'true'
  # so prod builds keep the CI AI run path enabled; override at submit time if a
  # build ever needs it disabled. The server still independently gates the run
  # via CLINICAL_INTELLIGENCE_V1_ENABLED on the Cloud Run service.
  _VITE_CLINICAL_INTELLIGENCE_V1_ENABLED: 'true'
  _IMAGE: 'europe-west1-docker.pkg.dev/psychiatry-ink-beta/cloud-run-source-deploy/psychiatry-ink:master-merged'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
