<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Psychiatry.ink</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>

    <!--
      Unsupported / legacy browser fallback. A modern Vite ES-module bundle cannot
      run in Internet Explorer (or other browsers without <script type="module">
      support), so #root would otherwise stay empty and show a blank white page.

      We detect legacy browsers with an AFFIRMATIVE, synchronous feature test:
      `'noModule' in document.createElement('script')` is true in every browser
      that can run ES modules (Chrome 61+, Firefox 60+, Edge 16+, Safari 11+ incl.
      all current iOS Safari) and false in genuinely legacy ones (e.g. IE11). The
      warning therefore only appears for real legacy browsers and stays hidden for
      module-capable ones.

      IMPORTANT: this MUST be a classic <script> (not type="module" / nomodule):
      - `nomodule` is unreliable — Safari 10.1 / iOS 10.3 and some locked-down
        browsers buggily execute nomodule scripts and wrongly show the warning.
      - A `type="module"` re-hide would be bundled by Vite into the main app chunk
        and would only run AFTER the whole (multi-MB) bundle downloads + executes,
        leaving the warning visible until then on slow/mobile connections.
      A classic inline script is left untouched by Vite and runs synchronously
      during parse, so the decision is correct and immediate.
    -->
    <div
      id="legacy-browser-warning"
      hidden
      style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #ffffff;
        color: #24211e;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        z-index: 2147483647;
      "
    >
      <div style="max-width: 32rem;">
        <h1 style="font-size: 20px; font-weight: 700; margin: 0 0 12px;">
          Psychiatry.Ink
        </h1>
        <p style="font-size: 15px; line-height: 1.5; margin: 0 0 8px;">
          Your browser is not supported. Please open Psychiatry.Ink in a current
          version of Chrome, Edge, Firefox or Safari.
        </p>
        <p style="font-size: 15px; line-height: 1.5; margin: 0; color: #6d655c;">
          Ihr Browser wird nicht unterstützt. Bitte öffnen Sie Psychiatry.Ink in
          einer aktuellen Version von Chrome, Edge, Firefox oder Safari.
        </p>
      </div>
    </div>
    <script>
      (function () {
        // Show the legacy warning ONLY when the browser cannot run ES modules.
        if ('noModule' in document.createElement('script')) return
        var warning = document.getElementById('legacy-browser-warning')
        if (warning) warning.hidden = false
        var root = document.getElementById('root')
        if (root) root.style.display = 'none'
      })()
    </script>
    <noscript>
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          background: #ffffff;
          color: #24211e;
          font-family: Arial, Helvetica, sans-serif;
          text-align: center;
        "
      >
        <div style="max-width: 32rem;">
          <p style="margin: 0 0 8px;">
            JavaScript is required to use Psychiatry.Ink. Please enable JavaScript
            and reload this page.
          </p>
          <p style="margin: 0; color: #6d655c;">
            Psychiatry.Ink benötigt JavaScript. Bitte aktivieren Sie JavaScript
            und laden Sie die Seite neu.
          </p>
        </div>
      </div>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
